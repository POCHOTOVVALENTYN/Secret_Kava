# .github/workflows/pipeline.yml
name: Enterprise CI/CD Delivery Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linting & Test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -r pyproject.toml

      - name: Run Ruff Linter
        run: uv run --system ruff check app

      - name: Run static type analysis via mypy
        run: uv run --system mypy app

  build-and-deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud VM via Remote SSH execution
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/psychology-bot
            git pull origin main
            docker-compose up -d --build
            docker image prune -f
