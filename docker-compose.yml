version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: psy_space_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-secure_pg_pass}
      POSTGRES_DB: ${DB_NAME:-psychology_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: psy_space_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS:-redis_secure_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redis_secure_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_api:
    build: .
    container_name: psy_space_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASS:-secure_pg_pass}@postgres:5432/${DB_NAME:-psychology_db}
      - REDIS_URL=redis://:${REDIS_PASS:-redis_secure_pass}@redis:6379/0
      - TELEGRAM_BOT_TOKEN=${BOT_TOKEN}
      - MONOBANK_API_TOKEN=${MONO_TOKEN}
    ports:
      - "8000:8000"

volumes:
  pg_data:
  redis_data:
